version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: resume-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - resume-network

  redis:
    image: redis:7-alpine
    container_name: resume-redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    networks:
      - resume-network

  backend:
    build:
      context: ./backend

    container_name: resume-backend
    restart: unless-stopped

    ports:
      - "3000:3000"

    depends_on:
      - postgres
      - redis

    env_file:
      - ./backend/.env

    networks:
      - resume-network

  frontend:
    build:
      context: ./frontend

    container_name: resume-frontend
    restart: unless-stopped

    ports:
      - "5000:80"

    depends_on:
      - backend

    networks:
      - resume-network

  nginx:
    image: nginx:alpine

    container_name: resume-nginx
    restart: unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      - frontend
      - backend

    networks:
      - resume-network

volumes:
  postgres_data:
  redis_data:

networks:
  resume-network: